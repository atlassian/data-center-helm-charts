{{- if .Values.gateway.create }}
{{- include "common.gateway.validateConfig" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.names.fullname" . }}
  labels:
    {{- include "common.labels.commonLabels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Reference to the Gateway
  parentRefs:
  - name: {{ .Values.gateway.gatewayName }}
    {{- if .Values.gateway.gatewayNamespace }}
    namespace: {{ .Values.gateway.gatewayNamespace }}
    {{- end }}
  
  # Hostnames to match
  hostnames:
  {{- range .Values.gateway.hostnames }}
  - {{ . | quote }}
  {{- end }}
  
  # Routing rules
  rules:

  {{- if .Values.synchrony.enabled }}
  # Synchrony rule (collaborative editing)
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.synchrony.ingress.path | default "/synchrony" }}
    {{- with .Values.gateway.timeouts }}
    timeouts:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    backendRefs:
    - name: {{ include "synchrony.fullname" . }}
      port: {{ .Values.synchrony.service.port }}
      weight: 100
  {{- end }}

  # Default rule - routes to Confluence service
  - matches:
    - path:
        type: {{ .Values.gateway.pathType }}
        value: {{ .Values.gateway.path }}
    {{- with .Values.gateway.timeouts }}
    timeouts:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.gateway.filters }}
    filters:
    {{- toYaml .Values.gateway.filters | nindent 4 }}
    {{- end }}
    backendRefs:
    - name: {{ include "common.names.fullname" . }}
      port: {{ .Values.confluence.service.port }}
      weight: 100
  
  {{- if .Values.gateway.additionalRules }}
  # Additional custom rules
  {{- toYaml .Values.gateway.additionalRules | nindent 2 }}
  {{- end }}
{{- end }}
