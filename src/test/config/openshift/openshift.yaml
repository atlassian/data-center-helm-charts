volumes:
  localHome:
    persistentVolumeClaim:
      storageClassName: topolvm-provisioner
  sharedHome:
    persistentVolumeClaim:
      create: false
    customVolume:
      persistentVolumeClaim:
        claimName: shared-home-pvc

openshift:
  runWithRestrictedSCC: true

ingress:
  openShiftRoute: false
  create: false
  host: atlassian.apps.crc.testing

gateway:
  create: true
  gatewayName: atlassian-gateway
  hostnames:
    - atlassian.apps.crc.testing
  https: false
