volumes:
  localHome:
    persistentVolumeClaim:
      storageClassName: topolvm-provisioner
  sharedHome:
    persistentVolumeClaim:
      create: false
    customVolume:
      persistentVolumeClaim:
        claimName: shared-home-pvc

openshift:
  runWithRestrictedSCC: true

gateway:
  create: true
  parentRef:
    name: atlassian-gateway
  hostnames:
    - atlassian.apps.crc.testing
  https: false
